name: Performance Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  load-testing:
    name: Load Testing with k6
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: postgres
          POSTGRES_DB: harmonic_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install server dependencies
      working-directory: server
      run: npm ci

    - name: Generate Prisma client
      working-directory: server
      run: npx prisma generate

    - name: Run database migrations
      working-directory: server
      run: npm run migrate
      env:
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/harmonic_test

    - name: Build server
      working-directory: server
      run: npm run build

    - name: Start API server
      working-directory: server
      run: npm start &
      env:
        NODE_ENV: test
        PORT: 3001
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/harmonic_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-test-secret-not-for-production

    - name: Wait for server to be ready
      run: |
        for i in $(seq 1 30); do
          curl -sf http://localhost:3001/api/health && break
          sleep 2
        done

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring \
          --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
          --keyserver hkp://keyserver.ubuntu.com:80 \
          --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
          | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update -qq && sudo apt-get install -y k6

    - name: Run load tests
      run: |
        k6 run -e BASE_URL=http://localhost:3001 server/tests/performance/load-test.js
        k6 run -e BASE_URL=http://localhost:3001 server/tests/performance/stress-test.js
        k6 run -e BASE_URL=http://localhost:3001 server/tests/performance/harmonic-protocol-test.js

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: performance-results/
        if-no-files-found: ignore

  lighthouse-audit:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: demo-web/harmonic-demo/package-lock.json

    - name: Install Next.js dependencies
      working-directory: demo-web/harmonic-demo
      run: npm ci

    - name: Build Next.js app
      working-directory: demo-web/harmonic-demo
      run: npm run build

    - name: Start Next.js app
      working-directory: demo-web/harmonic-demo
      run: npm start &
      env:
        PORT: 3000

    - name: Wait for app to be ready
      run: |
        for i in $(seq 1 30); do
          curl -sf http://localhost:3000 && break
          sleep 2
        done

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v12
      with:
        configPath: './server/lighthouse.config.js'
        uploadArtifacts: true
        temporaryPublicStorage: true

  database-performance:
    name: Database Performance Testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: postgres
          POSTGRES_DB: harmonic_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install dependencies
      working-directory: server
      run: npm ci

    - name: Generate Prisma client
      working-directory: server
      run: npx prisma generate

    - name: Run database migrations
      working-directory: server
      run: npm run migrate
      env:
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/harmonic_test

    - name: Seed performance data
      working-directory: server
      run: npm run seed:performance
      env:
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/harmonic_test

    - name: Run database performance tests
      working-directory: server
      run: npm run test:db-performance
      env:
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/harmonic_test

    - name: Generate performance report
      working-directory: server
      run: npm run report:db-performance

    - name: Upload database performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: db-performance-results
        path: db-performance-results/
        if-no-files-found: ignore
